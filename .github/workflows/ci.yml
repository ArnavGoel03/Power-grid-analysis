name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Notebook + assets sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify required artifacts exist
        run: |
          test -f README.md
          test -f LICENSE
          test -f index.md
          ls assets
